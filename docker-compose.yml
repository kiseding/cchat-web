services:
  cchat-web:
    build: .
    ports:
      - "${PORT:-4096}:4096"
    environment:
      - AUTH_TOKEN=${AUTH_TOKEN:-cchat2web}
      - PORT=4096
      - CLAUDE_PATH=/usr/local/bin/claude
    volumes:
      - ${CLAUDE_PATH:-/usr/bin/claude}:/usr/local/bin/claude:ro
      - ${HOME}/.claude:/root/.claude
      - ./data:/root/.cchat2web
    restart: unless-stopped
