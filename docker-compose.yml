services:
  cchat-web:
    # 从 GitHub Container Registry 拉取预构建镜像
    image: ghcr.io/kiseding/cchat-web:latest
    # 如需本地构建，注释掉 image 行，取消下面注释：
    # build: .

    ports:
      - "${PORT:-4096}:4096"

    environment:
      # 登录密码，修改为你自己的密码
      - AUTH_TOKEN=${AUTH_TOKEN:-cchat2web}
      - PORT=4096
      # 容器内 Claude Code 路径
      - CLAUDE_PATH=/usr/local/bin/claude

    volumes:
      # 挂载主机上的 Claude Code 二进制到容器内（只读）
      - ${CLAUDE_PATH:-/usr/bin/claude}:/usr/local/bin/claude:ro
      # 挂载 Claude Code 配置目录（API 密钥等）
      - ${HOME}/.claude:/root/.claude
      # 持久化会话数据
      - ./data:/root/.cchat2web

    restart: unless-stopped
